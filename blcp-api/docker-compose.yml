services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_blcp_data:/var/lib/postgresql
  redis:
    image: redis:latest
    ports:
      - "6378:6379"
    volumes:
      - redis_blcp_data:/data

volumes:
  postgres_blcp_data:
  redis_blcp_data:
